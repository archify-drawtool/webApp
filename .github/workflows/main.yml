name: Production CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  nuxt-checks:
    runs-on: ubuntu-latest
    environment: productie

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  docker-build-and-push:
    needs: nuxt-checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}/archify-frontend:main" .

      - name: Push to Docker Hub
        run: docker push "${{ secrets.DOCKER_USERNAME }}/archify-frontend:main"
